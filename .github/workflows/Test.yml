name: Cloud PC + Stable RDP Tunnel + Opera GX

on:
  workflow_dispatch:
    inputs:
      runtime_minutes:
        description: "Runtime in minutes"
        required: false
        default: "355"
      ngrok_token:
        description: "Your Ngrok Auth Token (Get from dashboard.ngrok.com)"
        required: true

jobs:
  desktop:
    runs-on: windows-latest
    timeout-minutes: 370
    steps:
      - name: Disable Firewall & Enable RDP
        run: |
          Set-NetFirewallProfile -Profile Public,Private,Domain -Enabled False
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
          Start-Service -Name "TermService" -ErrorAction SilentlyContinue

      - name: Setup User
        run: |
          $Password = ConvertTo-SecureString "Pass1234" -AsPlainText -Force
          Remove-LocalUser -Name "user" -ErrorAction SilentlyContinue
          New-LocalUser -Name "user" -Password $Password -Description "Cloud PC" -PasswordNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "user"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "user"

      - name: Start Ngrok Tunnel
        uses: ngrok/ngrok-action@v1
        with:
          token: ${{ inputs.ngrok_token }}
          addr: 3389
          proto: tcp

      - name: Keep Alive
        run: |
          Write-Host "✅ Connection is live via Ngrok TCP. Check the Ngrok UI link above."
          Start-Sleep -Seconds 21000
