name: OperaGX PC

on:
  workflow_dispatch:
    inputs:
      ts_tailnet:         { description: "Tailscale tailnet (e.g. you@gmail.com)", required: true }
      ts_api_key:         { description: "Tailscale API key (device admin, no Bearer)", required: true }
      ts_authkey:         { description: "Tailscale Auth key (reusable or ephemeral)", required: true }

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 190 # Set slightly above runtime to allow safe shutdown/cleanup
    env:
      RDP_USER: user
      RDP_PASS: Pass@1234
      TS_HOSTNAME: pc
      RUNTIME_MINUTES: 180 # Exactly 3 Hours

    steps:
      - name: Purge existing pc devices from Tailnet
        run: |
          try {
            $auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("${{ inputs.ts_api_key }}:"))
            $tn = [uri]::EscapeDataString("${{ inputs.ts_tailnet }}")
            $list = Invoke-RestMethod -Uri "https://api.tailscale.com/api/v2/tailnet/$tn/devices" -Headers @{ Authorization = "Basic $auth" }
            foreach($d in $list.devices){
              if ($d.hostname -eq "pc"){
                Invoke-RestMethod -Method Delete -Uri "https://api.tailscale.com/api/v2/device/$($d.id)" -Headers @{ Authorization = "Basic $auth" } -ErrorAction SilentlyContinue
              }
            }
            Write-Host "Purged old pc device registration to avoid conflict."
          } catch { Write-Host "Purge warning: $($_.Exception.Message)" }

      - name: Install + Up Tailscale
        run: |
          $ts = "$env:ProgramFiles\Tailscale\tailscale.exe"
          if (-not (Test-Path $ts)) {
            $url = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
            $dst = "$env:TEMP\tailscale.msi"
            Invoke-WebRequest -Uri $url -OutFile $dst
            Start-Process msiexec.exe -ArgumentList "/i","`"$dst`"","/quiet","/norestart" -Wait
            Remove-Item $dst -Force
          }
          & $ts logout | Out-Null
          & $ts up --authkey "${{ inputs.ts_authkey }}" --hostname "$env:TS_HOSTNAME" --accept-dns=true --accept-routes=true
          $ip4 = & $ts ip -4 | Select-Object -First 1
          Write-Host "Tailscale Connected successfully. IPv4: $ip4"

      - name: Enable RDP user + firewall
        run: |
          $u=$env:RDP_USER; $p=$env:RDP_PASS
          $sec = ConvertTo-SecureString $p -AsPlainText -Force
          if (-not (Get-LocalUser -Name $u -EA SilentlyContinue)) {
            New-LocalUser -Name $u -Password $sec -AccountNeverExpires
            Add-LocalGroupMember -Group "Administrators" -Member $u
            Add-LocalGroupMember -Group "Remote Desktop Users" -Member $u
          } else {
            Set-LocalUser -Name $u -Password $sec -AccountNeverExpires
            Enable-LocalUser -Name $u
            Add-LocalGroupMember -Group "Administrators" -Member $u -EA SilentlyContinue
            Add-LocalGroupMember -Group "Remote Desktop Users" -Member $u -EA SilentlyContinue
          }
          Set-ItemProperty "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name fDenyTSConnections -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" | Out-Null
          Write-Host "RDP ready. Connection Details -> Hostname: $env:TS_HOSTNAME | User: $u | Pass: $p"

      - name: Download & Pre-Install Opera GX
        run: |
          Write-Host "Fetching Opera GX Offline Installer..."
          $url = "https://net.geo.opera.com/opera_gx/stable/windows?utm_source=forsaken&utm_medium=gx"
          $installer = "$env:TEMP\OperaGXSetup.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer
          
          Write-Host "Pre-installing Opera GX silently for all users..."
          Start-Process -FilePath $installer -ArgumentList "/silent", "/allusers", "/launcherbrowser=0", "/desktopshortcut=1" -Wait
          
          $publicDesktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
          $userDesktop = "$env:USERPROFILE\Desktop"
          if (Test-Path "$userDesktop\Opera GX.lnk") {
              Move-Item -Path "$userDesktop\Opera GX.lnk" -Destination $publicDesktop -Force -ErrorAction SilentlyContinue
          }
          Write-Host "Opera GX successfully configured as a pre-installed desktop app!"

      - name: Keep alive (Environment Active Link)
        run: |
          $mins = [int]"${{ env.RUNTIME_MINUTES }}"
          $end = (Get-Date).AddMinutes($mins)
          while ((Get-Date) -lt $end) {
            Write-Host ("Cloud PC Heartbeat " + (Get-Date).ToString("HH:mm:ss") + " | Active until " + $end.ToString("HH:mm:ss"))
            Start-Sleep -Seconds 60
          }

      # NEW: This step runs automatically when the 3 hours are up or if you manually cancel the workflow.
      - name: Auto-Delete Connection from Tailscale
        if: always()
        run: |
          Write-Host "3 hours finished. Initiating self-destruction from Tailnet dashboard..."
          try {
            $auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("${{ inputs.ts_api_key }}:"))
            $tn = [uri]::EscapeDataString("${{ inputs.ts_tailnet }}")
            
            # Find this specific running machine's Tailscale ID
            $list = Invoke-RestMethod -Uri "https://api.tailscale.com/api/v2/tailnet/$tn/devices" -Headers @{ Authorization = "Basic $auth" }
            foreach($d in $list.devices){
              if ($d.hostname -eq "pc"){
                Write-Host "Deleting device ID: $($d.id) from Tailscale network..."
                Invoke-RestMethod -Method Delete -Uri "https://api.tailscale.com/api/v2/device/$($d.id)" -Headers @{ Authorization = "Basic $auth" }
              }
            }
            Write-Host "Successfully deleted cloud PC from Tailscale. Dashboard is clean!"
          } catch {
            Write-Host "Cleanup error: $($_.Exception.Message)"
          }
