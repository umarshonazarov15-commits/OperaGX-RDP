name: Tailscale + Windows App

on:
  workflow_dispatch:
    inputs:
      runtime_minutes:    { description: "Runtime (max 360)", required: false, default: "355" }

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: write

defaults:
  run:
    shell: pwsh

jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 370
    env:
      RDP_USER: "user"
      RDP_PASS: "Pass1234"

    steps:
      - name: Verify Required GitHub Secrets Are Set
        run: |
          $missingSecrets = @()
          if (-not "${{ secrets.AUTH }}")  { $missingSecrets += "AUTH" }
          if (-not "${{ secrets.API }}")   { $missingSecrets += "API" }
          if (-not "${{ secrets.EMAIL }}") { $missingSecrets += "EMAIL" }

          if ($missingSecrets.Count -gt 0) {
              Write-Error "CRITICAL ERROR: The following required GitHub Secrets are missing or empty: ($($missingSecrets -join ', '))."
              exit 1
          }
          Write-Host "All required secrets validated successfully."

      - name: Wipe Unnecessary Pre-Installed GitHub Apps & Shortcuts
        run: |
          $publicDesktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
          $userDesktop = "$env:USERPROFILE\Desktop"
          $targets = @("Unity Hub.lnk", "R 4.6.0.lnk", "Firefox.lnk", "Google Chrome.lnk", "Claim Rewards Here.lnk")
          foreach ($target in $targets) { 
              if (Test-Path "$publicDesktop\$target") { Remove-Item "$publicDesktop\$target" -Force -ErrorAction SilentlyContinue }
              if (Test-Path "$userDesktop\$target") { Remove-Item "$userDesktop\$target" -Force -ErrorAction SilentlyContinue }
          }

      - name: Optimize Resolution & Force UI Automation Layers
        run: |
          Set-DisplayResolution -Width 1600 -Height 1200 -Force -ErrorAction SilentlyContinue
          
          # Force Windows to allow UI Automation over remote layers
          New-ItemProperty -Path "HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System" -Name "EnableUIADesktopToggle" -PropertyType DWord -Value 1 -Force -ErrorAction SilentlyContinue
          
          # Unblock Touch Remote restrictions in Remote Desktop Services
          $tsPath = "HKLM:\SYSTEM\CurrentControlSet\Control\Terminal Server\WinStations"
          New-ItemProperty -Path $tsPath -Name "TouchMode" -PropertyType DWord -Value 1 -Force -ErrorAction SilentlyContinue
          New-ItemProperty -Path $tsPath -Name "EnableTouchInjection" -PropertyType DWord -Value 1 -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 3

      - name: Download & Force Consumer Build of Opera GX
        run: |
          Write-Host "Fetching consumer-stable Opera GX Core..."
          $url = "https://net.geo.opera.com/opera_gx/stable/windows?utm_source=inf&utm_medium=gx"
          $installer = "$env:TEMP\OperaGXSetup.exe"
          Invoke-WebRequest -Uri $url -OutFile $installer
          
          # 1. Install browser silently
          Start-Process -FilePath $installer -ArgumentList "--silent=1", "--allusers=1", "--launchbrowser=0", "--desktopshortcut=1" -Wait

          $operaExe = "$env:ProgramFiles\Opera GX\opera.exe"
          if (-not (Test-Path $operaExe)) { $operaExe = "$env:ProgramFiles (x86)\Opera GX\opera.exe" }

          # 2. Workspace initialization profile launch
          Write-Host "Launching clean engine layer to initialize workspace profiles..."
          Start-Process -FilePath $operaExe -ArgumentList "--no-first-run"
          
          $profileDir = "$env:APPDATA\Opera Software\Opera GX Stable\Default"
          $prefPath = "$profileDir\Preferences"
          $backupPath = "$profileDir\Preferences.backup"
          
          for ($i = 1; $i -le 15; $i++) {
              if (Test-Path $prefPath) {
                  Write-Host "Pristine Preferences structure caught early on iteration $i!"
                  break
              }
              Start-Sleep -Seconds 2
          }

          # 3. Force stop browser to release file handles entirely
          Write-Host "Halting engine layer..."
          Stop-Process -Name "opera" -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 8

          # 4. Target profile configurations
          if (Test-Path $prefPath) {
              Write-Host "Natively generated Preferences found. Merging UI settings..."
              $configHashtable = Get-Content $prefPath -Raw | ConvertFrom-Json -AsHashtable
              if ($null -eq $configHashtable) { $configHashtable = @{} }

              if (-not $configHashtable.ContainsKey('ui')) { $configHashtable['ui'] = @{} }
              if (-not $configHashtable['ui'].ContainsKey('browser')) { $configHashtable['ui']['browser'] = @{} }
              if (-not $configHashtable['ui'].ContainsKey('sidebar')) { $configHashtable['ui']['browser']['sidebar'] = @{} }
              
              $configHashtable['ui']['browser']['sidebar']['item_prefs'] = @{
                  "visibility" = @{ "GxRewards" = $true }
              }
              
              $configHashtable['ui']['browser']['sidebar']['GxRewards'] = @{
                  "last_action_time" = "13426206569601273"
                  "last_used_ts" = "13426206569603970"
                  "notification_type" = "1"
              }

              $configHashtable['ui']['visibility'] = @{ "GxRewards" = $true }

              $finalJson = $configHashtable | ConvertTo-Json -Depth 100 -Compress
              Remove-Item $prefPath -Force -ErrorAction SilentlyContinue
              Remove-Item $backupPath -Force -ErrorAction SilentlyContinue
              Set-Content -Path $prefPath -Value $finalJson -Force
              Set-Content -Path $backupPath -Value $finalJson -Force
          }

          $publicDesktop = [Environment]::GetFolderPath("CommonDesktopDirectory")
          $userDesktop = "$env:USERPROFILE\Desktop"
          if (Test-Path "$userDesktop\Opera GX.lnk") {
              Move-Item -Path "$userDesktop\Opera GX.lnk" -Destination $publicDesktop -Force -ErrorAction SilentlyContinue
          }

          # 5. STEALTH AGENT PREP: Purging explicit system identifiers
          Write-Host "Purging execution environment variables..."
          $targetVars = @("GITHUB_ACTIONS", "GITHUB_RUN_ID", "GITHUB_REPOSITORY", "GITHUB_ACTOR", "RUNNER_NAME", "RUNNER_TRACKER")
          foreach ($var in $targetVars) {
              [Environment]::SetEnvironmentVariable($var, $null, "Process")
          }

          # Define targeted execution arguments loading the Urban VPN store page directly
          $targetUrl = "https://chromewebstore.google.com/detail/urban-vpn-proxy/eppiocemhmnlbhjplcgkofciiegomcon"
          $stealthArgs = "`"$targetUrl`" --no-first-run --disable-blink-features=AutomationControlled --disable-infobars --password-store=basic"

          Write-Host "Configuring explicit launcher shortcut targeting Urban VPN..."
          $WshShell = New-Object -ComObject WScript.Shell
          $Shortcut = $WshShell.CreateShortcut("$publicDesktop\Opera GX Browser.lnk")
          $Shortcut.TargetPath = $operaExe
          $Shortcut.Arguments = $stealthArgs
          $Shortcut.Save()
          Start-Sleep -Seconds 5

          Write-Host "Opening pristine workspace instance..."
          Start-Process -FilePath $operaExe -ArgumentList $stealthArgs
          Write-Host "Sequence finished. Workspace deployed smoothly with a single Urban VPN extension window active."
          Start-Sleep -Seconds 10

      - name: Parse Runtime Requirements
        run: |
          function IntOr($v,$d){ if("$v" -match '^\d+$'){ [int]$v } else { [int]$d } }
          $runtime = IntOr("${{ inputs.runtime_minutes }}",355)
          if ($runtime -gt 360 -or $runtime -lt 1) { $runtime = 355 }
          "RUNTIME_MINUTES=$runtime" | Out-File -Append $env:GITHUB_ENV

      - name: Purge Legacy Machine Registrations
        run: |
          try {
            $auth = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes("${{ secrets.API }}:"))
            $tn = [uri]::EscapeDataString("${{ secrets.EMAIL }}")
            $list = Invoke-RestMethod -Uri "https://api.tailscale.com/api/v2/tailnet/$tn/devices" -Headers @{ Authorization = "Basic $auth" }
            foreach($d in $list.devices){
              if ($d.hostname -match '^(bullet|pc)[0-9]*$'){
                Invoke-RestMethod -Method Delete -Uri "https://api.tailscale.com/api/v2/device/$($d.id)" -Headers @{ Authorization = "Basic $auth" } -ErrorAction SilentlyContinue
              }
            }
          } catch {}

      - name: Install & Authenticate Tailscale Network
        env:
          TS_AUTHKEY: ${{ secrets.AUTH }}
        run: |
          $ts = "$env:ProgramFiles\Tailscale\tailscale.exe"
          if (-not (Test-Path $ts)) {
            $url = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
            $dst = "$env:TEMP\tailscale.msi"
            Invoke-WebRequest -Uri $url -OutFile $dst
            Start-Process msiexec.exe -ArgumentList "/i","`"$dst`"","/quiet","/norestart" -Wait
            Remove-Item $dst -Force
          }
          & $ts logout | Out-Null
          
          Write-Host "Registering persistent tunnel layers..."
          & $ts up --authkey "$env:TS_AUTHKEY" --hostname "pc" --accept-dns=true --accept-routes=true
          
          $ip4 = & $ts ip -4 | Select-Object -First 1
          Write-Host "Tailscale Dedicated Node IP: $ip4"

      - name: Provision RDP User Identity & Global System Rules
        run: |
          Rename-Computer -NewName "pc" -Force -ErrorAction SilentlyContinue
          
          $u = $env:RDP_USER
          $sec = ConvertTo-SecureString $env:RDP_PASS -AsPlainText -Force
          
          # Create and enforce Admin privileges for account 'user'
          if (-not (Get-LocalUser -Name $u -EA SilentlyContinue)) {
            New-LocalUser -Name $u -Password $sec -AccountNeverExpires
          } else {
            Set-LocalUser -Name $u -Password $sec -AccountNeverExpires
            Enable-LocalUser -Name $u
          }
          
          # Enforce absolute Admin status and RDP workspace execution clearance
          Add-LocalGroupMember -Group "Administrators" -Member $u -ErrorAction SilentlyContinue
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $u -ErrorAction SilentlyContinue
          
          # Open local registry parameters allowing full RDP tunneling
          Set-ItemProperty "HKLM:\System\CurrentControlSet\Control\Terminal Server" -Name fDenyTSConnections -Value 0
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" | Out-Null

      - name: Structural Window Minimization
        run: |
          $shell = New-Object -ComObject Shell.Application
          $shell.MinimizeAll()

      - name: Connection Keep-Alive Loop
        run: |
          $mins = [int]$env:RUNTIME_MINUTES
          if (-not $mins) { $mins = 355 }
          
          $end = (Get-Date).AddMinutes($mins)
          while ((Get-Date) -lt $end) {
            Write-Host ("Tailscale/RDP Active Engine | Heartbeat " + (Get-Date).ToString("HH:mm:ss") + " ends at " + $end.ToString("HH:mm:ss"))
            Start-Sleep -Seconds 60
          }

      - name: Disconnect Tailscale Node Safely
        if: always()
        run: |
          $ts = "$env:ProgramFiles\Tailscale\tailscale.exe"
          if (Test-Path $ts) {
              Write-Host "Disconnecting machine and logging out of tailnet..."
              & $ts logout | Out-Null
          }
